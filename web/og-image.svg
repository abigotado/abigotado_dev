<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <!-- Branded Open Graph card for abigotado.dev. Source of truth for og-image.png.
       Regenerate the PNG with:  rsvg-convert -w 1200 -h 630 web/og-image.svg -o web/og-image.png -->
  <rect width="1200" height="630" fill="#0F1115"/>
  <defs>
    <pattern id="dots" width="46" height="46" patternUnits="userSpaceOnUse">
      <circle cx="3" cy="3" r="2" fill="#2DD4A7" opacity="0.13"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#dots)"/>

  <!-- editor / terminal card -->
  <rect x="80" y="78" width="1040" height="474" rx="16" fill="#171A21" stroke="#2A2F3A" stroke-width="1.5"/>

  <!-- traffic lights -->
  <circle cx="122" cy="124" r="9" fill="#EF5350"/>
  <circle cx="152" cy="124" r="9" fill="#F0A32F"/>
  <circle cx="182" cy="124" r="9" fill="#34C98E"/>

  <!-- RELEASE pill -->
  <rect x="936" y="107" width="148" height="34" rx="17" fill="#34C98E"/>
  <text x="1010" y="131" font-family="monospace" font-size="18" font-weight="700" fill="#0F1115" text-anchor="middle" letter-spacing="3">RELEASE</text>

  <!-- terminal command -->
  <text x="116" y="210" font-family="monospace" font-size="27" fill="#6B7280">$ <tspan fill="#E8EAF0">agents build</tspan> <tspan fill="#2DD4A7">abigotado.dev</tspan> <tspan fill="#F0A32F">--release</tspan></text>

  <!-- name -->
  <text x="114" y="320" font-family="sans-serif" font-size="74" font-weight="700" fill="#E8EAF0">Nikita Kovalenko</text>

  <!-- tagline -->
  <text x="116" y="370" font-family="sans-serif" font-size="29" fill="#9AA3B2">Senior Flutter Engineer · architecture · team leadership · AI-first</text>

  <!-- metric chips -->
  <g font-family="monospace">
    <rect x="116" y="420" width="232" height="86" rx="12" fill="#1E222B" stroke="#2A2F3A"/>
    <text x="140" y="455" font-size="16" fill="#9AA3B2">UI responsiveness</text>
    <text x="140" y="489" font-size="26" font-weight="700" fill="#E8EAF0">×3–5</text>

    <rect x="364" y="420" width="232" height="86" rx="12" fill="#1E222B" stroke="#2A2F3A"/>
    <text x="388" y="455" font-size="16" fill="#9AA3B2">test coverage</text>
    <text x="388" y="489" font-size="26" font-weight="700" fill="#E8EAF0">70–75%</text>

    <rect x="612" y="420" width="232" height="86" rx="12" fill="#1E222B" stroke="#2A2F3A"/>
    <text x="636" y="455" font-size="16" fill="#9AA3B2">downloads</text>
    <text x="636" y="489" font-size="26" font-weight="700" fill="#E8EAF0">10K+</text>
  </g>

  <!-- domain -->
  <text x="1084" y="489" font-family="monospace" font-size="22" fill="#8B80F9" text-anchor="end">abigotado.dev</text>
</svg>
