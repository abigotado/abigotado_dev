# CD — deploy to GitHub Pages
#
# Builds the Flutter web release and publishes it to GitHub Pages on every push
# to main (and on manual dispatch). Free for public repos, no external secrets,
# and reachable from Russia — unlike Cloudflare, which Russian ISPs throttle to
# ~16 KB/connection (so a Flutter-web bundle there is effectively unusable).
#
# Custom domain: web/CNAME (abigotado.dev) is bundled into build/web, so the
# Pages artifact carries the domain. To go live, point DNS at GitHub Pages:
#   A     @   185.199.108.153  185.199.109.153  185.199.110.153  185.199.111.153
#   AAAA  @   2606:50c0:8000::153  ::8001::153  ::8002::153  ::8003::153
#   (or an ALIAS/ANAME @ -> abigotado.github.io if the registrar flattens apex)
# then tick "Enforce HTTPS" in Settings → Pages once the certificate is issued.

name: CD

on:
  push:
    branches: [main]
  workflow_dispatch:

# One deploy at a time; never cancel an in-progress publish (that can leave the
# live site half-updated).
concurrency:
  group: pages
  cancel-in-progress: false

permissions:
  contents: read
  pages: write # publish the Pages deployment
  id-token: write # OIDC token the deploy-pages action exchanges with Pages

jobs:
  deploy:
    name: Build and deploy to GitHub Pages
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # Hard guard: production is only ever deployed from main — even a manual
    # dispatch from a feature branch cannot publish.
    if: github.ref == 'refs/heads/main'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      # Pub-cache: one mechanism only — this SHA-pinned step, keyed on pubspec.lock.
      # flutter-action's own pub caching is disabled via `pub-cache: "false"`.
      - name: Cache pub packages
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Set up Flutter
        uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2.23.0
        with:
          flutter-version: "3.44.0"
          channel: stable
          cache: true
          pub-cache: "false"

      - name: Install dependencies
        run: flutter pub get

      # l10n gen output is git-ignored; regenerate it so the build resolves
      # AppLocalizations. (Committed *.g.dart is already present from checkout.)
      - name: Generate l10n
        run: flutter gen-l10n

      - name: Build web (release)
        # --base-href "/" because abigotado.dev serves from the apex root.
        # web/CNAME is copied into build/web, so the artifact carries the domain.
        run: flutter build web --release --base-href "/"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: build/web

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
