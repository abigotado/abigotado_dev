# CD — Cloudflare Pages deploy
#
# DORMANT: this workflow fires only on manual dispatch.
# To activate auto-deploy on push to main, complete the checklist below and
# add `push: branches: [main]` to the `on:` block.
#
# Activation checklist (do in order):
#   1. Create the GitHub remote and push: `git remote add origin <url> && git push -u origin main`
#   2. Create a Cloudflare Pages project named `abigotado-dev` in direct-upload
#      mode via the Cloudflare dashboard (Workers & Pages → Create → Direct upload).
#      The deploy step does NOT create the project — it must already exist.
#   3. Mint a scoped Cloudflare API token (Permissions: Cloudflare Pages: Edit)
#      and add two repo secrets:
#        • CLOUDFLARE_API_TOKEN  — the scoped token
#        • CLOUDFLARE_ACCOUNT_ID — your Cloudflare account ID
#   4. Create a "production" GitHub Environment (Settings → Environments) and
#      scope CLOUDFLARE_API_TOKEN + CLOUDFLARE_ACCOUNT_ID to it. Optionally
#      add required reviewers for an extra approval gate before every deploy.
#   5. Add `push: branches: [main]` to the `on:` block below to enable
#      automatic deployment on every merge to main.
#   6. Point the abigotado.dev apex domain at the Pages project in the
#      Cloudflare dashboard (Custom domains → Set up a custom domain).
#   7. Uncomment the CI/CD badge block in README.md.

name: CD

on:
  workflow_dispatch:

concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy:
    name: Build and deploy to Cloudflare Pages
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # Hard guard: production is only ever deployed from main.
    # workflow_dispatch lets an operator pick any ref; this if: ensures that
    # even a manual dispatch on a feature branch cannot publish to production.
    if: github.ref == 'refs/heads/main'
    # Ties the deploy to a GitHub Environment for audit trail, approval gates,
    # and secret scoping. Before activating: create a "production" Environment
    # in Settings → Environments and scope CLOUDFLARE_API_TOKEN +
    # CLOUDFLARE_ACCOUNT_ID to it (optionally with required reviewers).
    # Referencing an environment that doesn't exist yet is safe for a dormant
    # workflow — GitHub creates it on first run.
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      # Pub-cache: one mechanism only — this SHA-pinned step, keyed on pubspec.lock.
      # flutter-action's pub-cache side is disabled via `pub-cache: "false"` below
      # to prevent a duplicate entry with a different (Flutter-version-based) key.
      - name: Cache pub packages
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      # `cache: true` caches only the Flutter SDK (large download; worth it).
      # `pub-cache: "false"` disables flutter-action's built-in pub caching so the
      # explicit SHA-pinned step above is the sole pub-cache mechanism.
      # NOTE: flutter-action's internal SDK cache uses `actions/cache@v5` by tag
      # (a composite action's internals cannot be SHA-pinned without forking).
      # This is a scoped, accepted exception; dependabot (github-actions) keeps
      # flutter-action itself current so the transitive tag is rotated on updates.
      - name: Set up Flutter
        uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2.23.0
        with:
          flutter-version: "3.44.0"
          channel: stable
          cache: true
          pub-cache: "false"

      - name: Install dependencies
        run: flutter pub get

      - name: Generate l10n
        run: flutter gen-l10n

      - name: Build web (release)
        # --base-href "/" because abigotado.dev is served from the apex domain root.
        run: flutter build web --release --base-href "/"

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@ebbaa1584979971c8614a24965b4405ff95890e0 # v4.0.0
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # Pinned Wrangler version: prevents a silent CLI upgrade when the action
          # is bumped. Update deliberately alongside action version bumps.
          wranglerVersion: "3.114.17"
          command: pages deploy build/web --project-name=abigotado-dev --branch=main
