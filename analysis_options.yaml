# Strict static analysis — the repo is public and the code is the portfolio.
# Base: very_good_analysis (a superset of flutter_lints / lints, opinionated).
include: package:very_good_analysis/analysis_options.yaml

analyzer:
  language:
    strict-casts: true
    strict-inference: true
    strict-raw-types: true
  errors:
    # Docs are not mandatory on a personal site; everything else keeps
    # very_good_analysis' default severity.
    public_member_api_docs: ignore
  exclude:
    - "**/*.g.dart"
    - "**/*.freezed.dart"
    - "**/*.gr.dart"
    - "**/l10n/gen/**"

linter:
  rules:
    # very_good_analysis already backs the project's global NEVER/ALWAYS
    # guidance (prefer_const_constructors, use_super_parameters,
    # prefer_final_locals, avoid_redundant_argument_values, …). Structural
    # rules (no Widget _buildX(), sealed-class factories) are enforced in
    # review, not by the analyzer.
    prefer_single_quotes: true
